<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Valorant Rank Overlay</title>
<style>
  :root{
    --panel: rgba(10,11,14,0.92);
    --line: rgba(255,255,255,0.07);
    --line2: rgba(255,255,255,0.12);
    --text: #F0F0F2;
    --muted: #6E7180;
    --accent: #3B82F6;
    --accent2: #60A5FA;
    --gold: #C8A84B;
    --good: #22C55E;
    --bad: #EF4444;
    --grad: linear-gradient(135deg, #1E3A5F 0%, #0F1A2E 100%);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    background: transparent;
    font-family: 'Inter','Segoe UI',Arial,sans-serif;
    color: var(--text);
    width: 320px;
  }

  .card{
    background: var(--panel);
    border: 1px solid var(--line2);
    border-radius: 12px;
    overflow: hidden;
    backdrop-filter: blur(12px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
  }

  /* top label bar */
  .top-bar{
    display: flex;
    border-bottom: 1px solid var(--line);
  }
  .top-label{
    flex: 1;
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 0;
    color: var(--muted);
  }
  .top-label.current{ color: var(--accent2); background: rgba(59,130,246,0.08); }
  .top-label.peak{ color: var(--gold); background: rgba(200,168,75,0.07); }
  .top-divider{ width: 1px; background: var(--line); }

  /* main row */
  .main-row{
    display: flex;
  }

  /* rank block shared */
  .rank-block{
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px 10px 16px;
    position: relative;
    overflow: hidden;
    background: var(--grad);
  }
  .rank-block.peak-block{
    background: linear-gradient(135deg, #2A2010 0%, #141008 100%);
    border-left: 1px solid var(--line);
  }
  .rank-block::before{
    content:'';
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .rank-block.current-block::before{
    background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.16) 0%, transparent 65%);
  }
  .rank-block.peak-block::before{
    background: radial-gradient(ellipse at 50% 0%, rgba(200,168,75,0.14) 0%, transparent 65%);
  }

  .rank-icon{
    width: 58px;
    height: 58px;
    object-fit: contain;
    position: relative;
    z-index: 1;
    margin-bottom: 6px;
  }
  .rank-block.current-block .rank-icon{
    filter: drop-shadow(0 0 12px rgba(59,130,246,0.45));
  }
  .rank-block.peak-block .rank-icon{
    filter: drop-shadow(0 0 12px rgba(200,168,75,0.45));
  }

  .rank-name{
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
    color: #fff;
    position: relative; z-index: 1;
    line-height: 1.2;
  }

  .rr-value{
    font-size: 24px;
    font-weight: 800;
    line-height: 1;
    margin-top: 6px;
    position: relative; z-index: 1;
  }
  .rank-block.current-block .rr-value{ color: #fff; }
  .rank-block.peak-block .rr-value{ color: var(--gold); }

  .rr-label{
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
    position: relative; z-index: 1;
  }
  .rank-block.current-block .rr-label{ color: var(--accent2); }
  .rank-block.peak-block .rr-label{ color: var(--gold); opacity: 0.7; }

  .rr-track{
    width: 72px;
    height: 3px;
    background: rgba(255,255,255,0.10);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
    position: relative; z-index: 1;
  }
  .rr-fill{
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  .rank-block.current-block .rr-fill{
    background: linear-gradient(90deg, #2563EB, #60A5FA, #93C5FD);
    box-shadow: 0 0 8px rgba(96,165,250,0.6);
  }
  .rank-block.peak-block .rr-fill{
    background: linear-gradient(90deg, #92620A, #C8A84B, #F0D080);
    box-shadow: 0 0 8px rgba(200,168,75,0.5);
  }

  /* status bar */
  .status-bar{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 5px 12px;
    border-top: 1px solid var(--line);
    background: rgba(0,0,0,0.2);
  }
  .status-dot{
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--good);
    box-shadow: 0 0 6px var(--good);
    flex-shrink: 0;
  }
  .status-dot.err{ background: var(--bad); box-shadow: 0 0 6px var(--bad); }
  .status-text{ font-size: 9px; color: var(--muted); }

  @keyframes spin{ to{ transform: rotate(360deg); } }
  .spinner{
    width: 8px; height: 8px;
    border: 1.5px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="card">

  <div class="top-bar">
    <div class="top-label current">Rank Atual</div>
    <div class="top-divider"></div>
    <div class="top-label peak">Peak</div>
  </div>

  <div class="main-row">
    <div class="rank-block current-block">
      <img class="rank-icon" id="curIcon" src="" alt="rank">
      <div class="rank-name" id="curName">—</div>
      <div class="rr-value" id="curRR">—</div>
      <div class="rr-label">RR</div>
      <div class="rr-track"><div class="rr-fill" id="curFill" style="width:0%"></div></div>
    </div>

    <div class="rank-block peak-block">
      <img class="rank-icon" id="peakIcon" src="" alt="peak rank">
      <div class="rank-name" id="peakName">—</div>
      <div class="rr-value" id="peakRR">—</div>
      <div class="rr-label">RR</div>
      <div class="rr-track"><div class="rr-fill" id="peakFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">conectando…</span>
  </div>

</div>

<script>
/* =======================================================
   CONFIGURACOES — edite aqui o que quiser
   ======================================================= */
const CONFIG = {
  API_KEY:         "HDEV-9a04529c-cf8e-407e-a009-e849b0f0da7d",
  RIOT_NAME:       "Lisboa Unreal",   // nome antes do #
  RIOT_TAG:        "Quit",            // tag depois do #
  REGION:          "br",              // br | na | latam | eu | ap | kr
  PLATFORM:        "pc",
  REFRESH_SECONDS: 120,               // intervalo de atualizacao (segundos)

  // Peak manual — atualize quando bater novo recorde
  // Tier IDs: 21=Imortal1  22=Imortal2  23=Imortal3  24=Radiante
  PEAK_TIER_ID:   21,                 // 21 = Imortal 1
  PEAK_TIER_NAME: "Immortal 1",   // nome em ingles como vem da API
  PEAK_RR:        97,                 // RR no seu peak
};
/* ======================================================= */

const BASE = "https://api.henrikdev.xyz";
// Mapa de ícones por tier ID — buscado dinamicamente da valorant-api.com
let TIER_ICONS = {}; // tierId -> url do ícone

// URLs diretas dos icones por nome do rank
const RANK_ICONS = {
  "Iron 1":       "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/3/largeicon.png",
  "Iron 2":       "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/4/largeicon.png",
  "Iron 3":       "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/5/largeicon.png",
  "Bronze 1":     "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/6/largeicon.png",
  "Bronze 2":     "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/7/largeicon.png",
  "Bronze 3":     "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/8/largeicon.png",
  "Silver 1":     "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/9/largeicon.png",
  "Silver 2":     "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/10/largeicon.png",
  "Silver 3":     "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/11/largeicon.png",
  "Gold 1":       "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/12/largeicon.png",
  "Gold 2":       "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/13/largeicon.png",
  "Gold 3":       "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/14/largeicon.png",
  "Platinum 1":   "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/15/largeicon.png",
  "Platinum 2":   "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/16/largeicon.png",
  "Platinum 3":   "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/17/largeicon.png",
  "Diamond 1":    "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/18/largeicon.png",
  "Diamond 2":    "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/19/largeicon.png",
  "Diamond 3":    "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/20/largeicon.png",
  "Ascendant 1":  "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/21/largeicon.png",
  "Ascendant 2":  "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/22/largeicon.png",
  "Ascendant 3":  "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/23/largeicon.png",
  "Immortal 1":   "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/24/largeicon.png",
  "Immortal 2":   "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/25/largeicon.png",
  "Immortal 3":   "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/26/largeicon.png",
  "Radiant":      "https://media.valorant-api.com/competitivetiers/03621f52-342b-cf4e-4f86-9350a49c6d04/27/largeicon.png",
};

async function loadTierIcons(){ /* icones ja sao fixos, nada a carregar */ }

function getTierIcon(tierId, tierName){
  if(tierName && RANK_ICONS[tierName]) return RANK_ICONS[tierName];
  return "";
}

function setStatus(text, state){
  const dot = document.getElementById('statusDot');
  document.getElementById('statusText').textContent = text;
  dot.className = 'status-dot' + (state === 'err' ? ' err' : '');
  if(state === 'loading'){
    dot.style.display = 'none';
    let sp = document.getElementById('spinner');
    if(!sp){ sp = document.createElement('div'); sp.id='spinner'; sp.className='spinner'; dot.parentNode.insertBefore(sp, dot); }
    sp.style.display = 'block';
  } else {
    dot.style.display = 'block';
    const sp = document.getElementById('spinner');
    if(sp) sp.style.display = 'none';
  }
}

async function fetchJSON(url){
  const res = await fetch(url, { headers: { "Authorization": CONFIG.API_KEY } });
  if(!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

async function refresh(){
  setStatus("atualizando…", "loading");
  try{
    // 1) Rank atual
    const mmrUrl = `${BASE}/valorant/v3/mmr/${CONFIG.REGION}/${CONFIG.PLATFORM}/${encodeURIComponent(CONFIG.RIOT_NAME)}/${CONFIG.RIOT_TAG}`;
    const mmrJson = await fetchJSON(mmrUrl);
    const cur = mmrJson.data.current;

    document.getElementById('curName').textContent = cur.tier.name;
    document.getElementById('curRR').textContent   = cur.rr;
    document.getElementById('curFill').style.width = Math.min(cur.rr, 100) + "%";
    if(cur.tier?.id !== undefined)
      document.getElementById('curIcon').src = getTierIcon(cur.tier.id, cur.tier.name);

    // Peak: manual do CONFIG, sempre fixo
    document.getElementById('peakName').textContent = CONFIG.PEAK_TIER_NAME;
    document.getElementById('peakRR').textContent   = CONFIG.PEAK_RR;
    document.getElementById('peakFill').style.width = Math.min(CONFIG.PEAK_RR, 100) + "%";
    document.getElementById('peakIcon').src = getTierIcon(CONFIG.PEAK_TIER_ID, CONFIG.PEAK_TIER_NAME);

    const t = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    setStatus("atualizado às " + t, "ok");
  }catch(err){
    console.error(err);
    setStatus("erro: " + err.message, "err");
  }
}

refresh();
setInterval(refresh, CONFIG.REFRESH_SECONDS * 1000);
</script>
</body>
</html>
